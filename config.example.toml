[models]
default = "gork-default"
web_search = "gork-default"

[model.gork-default]
model = "YOUR_RESPONSES_API_MODEL"
base_url = "https://api.x.ai/v1"
backend = "responses"
env_key = ["GORK_API_KEY", "XAI_API_KEY"]
context_window = 131072
auto_compact_threshold_percent = 85

[endpoints]
# cli_chat_proxy_base_url = "https://cli-chat-proxy.grok.com/v1"
# managed_config_url = "https://cli-chat-proxy.grok.com/v1/deployment/config"
# deployment_key = "use-GROK_DEPLOYMENT_KEY-instead"

[session]
auto_compact_threshold_percent = 85

[features]
# two_pass_compaction = false

[memory]
# Memory is opt-in. --experimental-memory or GROK_MEMORY=true also enables it.
enabled = false

[memory.initial_injection]
enabled = true

[memory.session]
save_on_end = true

[compaction.memory_flush]
enabled = true
soft_threshold_tokens = 4000
# flush_model = "gork-default"
max_flush_write_chars = 8000
# idle_timeout_secs = 300

[compaction.pruning]
enabled = true
keep_last_n_turns = 3
soft_trim_threshold = 4000
soft_trim_head = 1500
soft_trim_tail = 1500
hard_clear_age_turns = 10

[grok_com_config]
# auth_provider_command = "security find-generic-password -w -s gork-token"
# auth_token_ttl = 3600
# force_login_team_uuid = "team-uuid"
# disable_api_key_auth = true

[grok_com_config.oauth2]
# principal_type = "Team"
# principal_id = "team-uuid"

[auth]
# preferred_method = "oidc" # or "api_key"

[folder_trust]
# Release builds default to true. Development builds keep the gate inert.
# enabled = true

# [[version_overrides]]
# minimum_version = "0.2.0"
# maximum_version = "0.3.0"
# [version_overrides.auth]
# preferred_method = "oidc"

[toolset.web_fetch]
# proxy_endpoint = "https://proxy.example:8443"
# allowed_domains = ["docs.example.com", "example.com/docs"]
# Omit allowed_domains to use the built-in documentation-domain list.
# An explicit empty list blocks every web_fetch request.

[toolset.ask_user_question]
# timeout_enabled = true
# timeout_secs = 1800

[goal]
# verifier_count = 3 # Clamped to 1..5; GROK_GOAL_VERIFIER_N has precedence.
# classifier_max_runs = 10 # Minimum 1; GROK_GOAL_CLASSIFIER_MAX has precedence.
# strategist_every = 5 # Defaults to max(1, classifier_max_runs / 2).
# use_current_model_only = false # GROK_GOAL_USE_CURRENT_MODEL_ONLY has precedence.
# strategist_model = { model = "reasoning", agent_type = "general-purpose" }
# skeptic_models = [
#   { model = "fast", agent_type = "explore" },
#   { model = "reasoning", agent_type = "general-purpose" },
# ]

[skills]
# paths = ["~/shared-skills", "/absolute/path/to/SKILL.md"]
# ignore = ["~/shared-skills/experimental"]
# disabled = ["manual-only"]

[plugins]
# Explicit paths are enabled automatically. Auto-discovered user/project plugins
# must be listed in enabled; disabled takes precedence.
# paths = ["~/my-plugins/deploy-tools"]
# enabled = ["team-tools"]
# disabled = ["old-tools"]

# [compat.cursor]
# mcps = false
# hooks = false
# [compat.claude]
# mcps = false
# hooks = false

[mcp_servers.example]
command = "example-mcp-server"
args = []
enabled = false

[[permission.rules]]
action = "allow"
tool = "bash"
pattern = "git status*"

[[permission.rules]]
action = "deny"
tool = "bash"
pattern = "git push --force*"

# [mcp_servers.remote]
# url = "https://mcp.example.com/rpc"
# headers = { Authorization = "Bearer token" }
# bearer_token_env_var = "MCP_ACCESS_TOKEN"

[lsp_servers.gopls]
command = "gopls"
args = []
extensions = [".go"]
initialization_options = { usePlaceholders = true }
settings = { gopls = { staticcheck = true } }
enabled = false
